name: CI

on:
  push:
  pull_request:

jobs:
  core:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install media dependencies
        run: brew install ffmpeg imagemagick
      - run: npm ci
      - run: npm run validate
      - run: npm run test:core
